<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <meta
      name="description"
      content="闲鱼捡漏助手：用价格、成色、卖家风险和交易安全信号评估二手商品是否值得入手。"
    />
    <title>闲鱼捡漏助手</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <img src="./assets/icon.svg" alt="" width="40" height="40" />
        <div>
          <p class="eyebrow">Deal Scout</p>
          <h1>闲鱼捡漏助手</h1>
        </div>
      </div>
      <button class="ghost-button" id="resetButton" type="button">清空</button>
    </header>

    <main class="app-shell">
      <section class="workspace">
        <form id="dealForm" class="panel input-panel">
          <div class="section-title">
            <h2>商品信息</h2>
            <span id="saveState">已自动保存</span>
          </div>

          <label>
            商品名称
            <input id="itemName" name="itemName" type="text" value="iPhone 15 Pro 256G" autocomplete="off" />
          </label>

          <div class="field-grid">
            <label>
              闲鱼价格
              <input id="askPrice" name="askPrice" type="number" min="0" step="1" value="4650" />
            </label>
            <label>
              市场参考价
              <input id="marketPrice" name="marketPrice" type="number" min="0" step="1" value="5700" />
            </label>
          </div>

          <div class="field-grid">
            <label>
              成色
              <select id="condition" name="condition">
                <option value="95">95 新以上</option>
                <option value="88" selected>轻微使用痕迹</option>
                <option value="72">明显磕碰/划痕</option>
                <option value="55">功能或外观有硬伤</option>
              </select>
            </label>
            <label>
              配件/凭证
              <select id="proof" name="proof">
                <option value="100">发票/保修/包装齐全</option>
                <option value="82" selected>有购买记录或包装</option>
                <option value="60">只有机器/主体</option>
                <option value="35">来源说不清</option>
              </select>
            </label>
          </div>

          <label>
            卖家描述
            <textarea id="description" name="description" rows="5">自用一手，国行，电池 91%，无拆无修，边框轻微使用痕迹，可走验货宝，支持同城面交。</textarea>
          </label>

          <div class="checklist">
            <h3>卖家信号</h3>
            <label><input type="checkbox" name="sellerSignals" value="personal" checked /> 明确说自用/一手</label>
            <label><input type="checkbox" name="sellerSignals" value="realPhotos" checked /> 有多张实拍和细节图</label>
            <label><input type="checkbox" name="sellerSignals" value="inspection" checked /> 接受验货宝/同城验机</label>
            <label><input type="checkbox" name="sellerSignals" value="bulkSeller" /> 主页大量同类商品</label>
            <label><input type="checkbox" name="sellerSignals" value="stockCopy" /> 描述像批量复制话术</label>
            <label><input type="checkbox" name="sellerSignals" value="avoidDetail" /> 拒绝补图/拒绝解释细节</label>
          </div>

          <div class="checklist">
            <h3>交易偏好</h3>
            <label><input type="checkbox" name="tradeSignals" value="sameCity" checked /> 同城面交优先</label>
            <label><input type="checkbox" name="tradeSignals" value="platformPay" checked /> 只走平台担保交易</label>
            <label><input type="checkbox" name="tradeSignals" value="noDeposit" checked /> 不接受定金/跳平台付款</label>
          </div>
        </form>

        <section class="panel result-panel" aria-live="polite">
          <div class="score-block">
            <div class="score-ring" id="scoreRing">
              <strong id="scoreValue">0</strong>
              <span>分</span>
            </div>
            <div>
              <p class="eyebrow">综合结论</p>
              <h2 id="verdict">正在评估</h2>
              <p id="summary">填写商品信息后会自动分析是否值得捡漏。</p>
            </div>
          </div>

          <div class="metrics">
            <article>
              <span>低价程度</span>
              <strong id="priceMetric">-</strong>
            </article>
            <article>
              <span>品质可信</span>
              <strong id="qualityMetric">-</strong>
            </article>
            <article>
              <span>卖家风险</span>
              <strong id="sellerMetric">-</strong>
            </article>
          </div>

          <div class="advice-grid">
            <div>
              <h3>建议动作</h3>
              <ul id="actionList"></ul>
            </div>
            <div>
              <h3>风险提示</h3>
              <ul id="riskList"></ul>
            </div>
          </div>

          <div class="offer-box">
            <span>建议出价区间</span>
            <strong id="offerRange">-</strong>
          </div>
        </section>
      </section>

      <section class="panel guide-panel">
        <h2>验货清单</h2>
        <div class="guide-list" id="guideList"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
