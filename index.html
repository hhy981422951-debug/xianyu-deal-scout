<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101820" />
    <meta
      name="description"
      content="闲鱼捡漏助手：粘贴商品链接，快速生成风险判断、验货问题和砍价话术。"
    />
    <title>闲鱼捡漏助手</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <nav class="topbar" aria-label="顶部导航">
          <a class="brand" href="./">
            <img src="./assets/icon.svg" alt="" width="38" height="38" />
            <span>闲鱼捡漏助手</span>
          </a>
          <button class="icon-button" id="clearButton" type="button" title="清空记录" aria-label="清空记录">
            <span aria-hidden="true">×</span>
          </button>
        </nav>

        <div class="hero-grid">
          <div class="hero-copy">
            <p class="eyebrow">Paste Link. Check Risk. Buy Smarter.</p>
            <h1>只粘贴闲鱼商品链接，就能开始判断值不值得捡。</h1>
            <p class="intro">
              自动识别链接和商品 ID，生成验货问题、卖家风险提醒、砍价话术和交易建议。少填表，多避坑。
            </p>
          </div>

          <section class="link-card" aria-label="链接分析">
            <label for="dealLink">闲鱼商品链接</label>
            <div class="paste-row">
              <input
                id="dealLink"
                type="url"
                inputmode="url"
                autocomplete="off"
                placeholder="粘贴闲鱼商品分享链接，例如 https://..."
              />
              <button id="pasteButton" type="button">粘贴</button>
            </div>
            <button class="primary-button" id="analyzeButton" type="button">开始识别</button>
            <p class="hint">
              纯网页工具不会绕过闲鱼登录或抓取隐私数据；它会基于链接结构生成核验清单，并引导你回到闲鱼确认价格、成色和卖家。
            </p>
          </section>
        </div>
      </section>

      <section class="result-strip" id="resultPanel" aria-live="polite">
        <article class="score-card">
          <span>链接可信度</span>
          <strong id="linkScore">--</strong>
          <p id="linkStatus">等待粘贴商品链接</p>
        </article>
        <article class="score-card">
          <span>商品 ID</span>
          <strong id="itemId">未识别</strong>
          <p>用于回到原链接核对商品。</p>
        </article>
        <article class="score-card">
          <span>建议动作</span>
          <strong id="actionLevel">待分析</strong>
          <p id="actionSummary">粘贴链接后生成下一步。</p>
        </article>
      </section>

      <section class="workbench">
        <section class="panel">
          <div class="panel-title">
            <span class="dot"></span>
            <h2>一键核验清单</h2>
          </div>
          <div class="check-grid" id="checkGrid"></div>
        </section>

        <section class="panel accent-panel">
          <div class="panel-title">
            <span class="dot amber"></span>
            <h2>卖家风险扫描</h2>
          </div>
          <ul class="risk-list" id="riskList"></ul>
        </section>

        <section class="panel message-panel">
          <div class="panel-title">
            <span class="dot green"></span>
            <h2>可复制沟通话术</h2>
          </div>
          <textarea id="messageBox" readonly rows="8"></textarea>
          <button class="secondary-button" id="copyMessageButton" type="button">复制话术</button>
        </section>

        <section class="panel history-panel">
          <div class="panel-title">
            <span class="dot blue"></span>
            <h2>最近分析</h2>
          </div>
          <div id="historyList" class="history-list"></div>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
